# Alembic Migration Configuration

# The following command is used to generate a new migration:
#   alembic revision --autogenerate -m "Add new column"

# The following command is used to upgrade to the latest migration:
#   alembic upgrade head

# The following command is used to downgrade one migration:
#   alembic downgrade -1

# For more information, see: https://alembic.sqlalchemy.org/

[alembic]
sqlalchemy.url = driver://user:password@localhost/dbname
script_location = .
version_path_separator = :
version_locations = %(here)s/versions

[loggers]
keys = root,sqlalchemy.engine,sqlalchemy.pool

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_sqlalchemy.pool]
level = WARN
handlers =
qualname = sqlalchemy.pool

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
